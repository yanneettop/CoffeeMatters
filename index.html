<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Coffee Matters | Specialty Coffee &amp; Café in Brick Lane, London</title>
    <meta name="description" content="Coffee Matters London — specialty coffee, authentic Greek pies, pastries &amp; brunch in the heart of Brick Lane. Dine in, events &amp; takeaway." />
    <link rel="canonical" href="https://coffeematters.london/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Coffee Matters" />
    <meta property="og:title" content="Coffee Matters | Specialty Coffee &amp; Café in Brick Lane, London" />
    <meta property="og:description" content="Specialty coffee, authentic Greek pies, pastries &amp; brunch in the heart of Brick Lane, London. Host your events with us." />
    <meta property="og:url" content="https://coffeematters.london/" />
    <meta property="og:image" content="https://coffeematters.london/hero-bg.webp" />
    <meta property="og:image:alt" content="Coffee Matters café interior at Brick Lane, London" />
    <meta property="og:locale" content="en_GB" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CafeOrCoffeeShop",
      "name": "Coffee Matters",
      "description": "Specialty coffee café in the heart of Brick Lane, London. Greek-style coffee, homemade pies, pastries and brunch.",
      "url": "https://coffeematters.london/",
      "image": "https://coffeematters.london/hero-bg.webp",
      "servesCuisine": ["Specialty Coffee", "Greek", "Pastries", "Brunch"],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Brick Lane",
        "addressLocality": "London",
        "addressCountry": "GB"
      },
      "hasMenu": "https://coffeematters.london/#menu"
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" />
    <link rel="preload" href="/hero-bg.webp" as="image" type="image/webp" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
